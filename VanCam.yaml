esphome:
  name: vancam
  friendly_name: VanCam

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:
  

psram:
  mode: quad
  speed: 80MHz


i2c:
  - id: bsp_i2c
    sda: GPIO12
    scl: GPIO14
  - id: cam_i2c
    sda: GPIO25
    scl: GPIO23

esp32_camera:
  name: OV3660 Camera
  external_clock:
    pin: GPIO27
    # Increase to 24MHz for faster data transfer from sensor to ESP32
    frequency: 20MHz
  i2c_id: cam_i2c
  data_pins: [GPIO32, GPIO35, GPIO34, GPIO5, GPIO39, GPIO18, GPIO36, GPIO19]
  vsync_pin: GPIO22
  href_pin: GPIO26
  pixel_clock_pin: GPIO21
  reset_pin: GPIO15
  
  # 1. Higher Resolution
  # UXGA (1600x1200) is the sweet spot for the OV3660. 
  # Going higher (QXGA) often causes stability issues on ESP32-CAMs.
  resolution: 1600x1200 
  
  # 2. Lower JPEG Quality Number = Better Image
  # Range is 10-63. 10 is very high quality but large file size.
  # 12 is a stable "sweet spot" for PSRAM-enabled devices.
  jpeg_quality: 12
  
  # 3. Image Enhancement Settings
  contrast: 1       # Increase punchiness (-2 to 2)
  brightness: 0     # Leave at 0 unless in a dark spot
  saturation: 1     # Better color for outdoors (-2 to 2)
  
  # 4. Light & Color Management
  # These help the camera adapt to the lighting in your New York rental property
  wb_mode: auto
  aec_mode: auto
  ae_level: 0
  agc_mode: auto
  agc_gain_ceiling: 2x # Limits noise in low light by not pushing gain too high
  aec2: True

# esp32_camera_web_server:
#   - port: 81
#     mode: stream
    
output:
  - platform: ledc
    id: blue_led
    pin: GPIO2

switch:
  - platform: gpio
    id: bat_hold_pin
    name: "Battery Hold Pin"
    pin: GPIO33
    restore_mode: RESTORE_DEFAULT_ON


light:
  - platform: monochromatic
    output: blue_led
    name: "Blue LED"
    restore_mode: RESTORE_DEFAULT_ON

time:
  - platform: bm8563
    i2c_id: bsp_i2c
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
  - platform: homeassistant
    # instead try to synchronize via network repeatedly ...
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        bm8563.write_time:


# only valid:
# battery hold pin is set, that means using the battery
# no external USB power connected
sensor:
  - platform: adc
    pin: GPIO38
    attenuation: 12dB
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 10s
    filters:
      - multiply: 1.51

  - platform: template
    id: battery_percent
    name: "Battery Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      float voltage = id(battery_voltage).state;
      float min_voltage = 3.350f;
      float max_voltage = 4.150f;
    
      if (voltage <= min_voltage) return 0.0;
      if (voltage >= max_voltage) return 100.0;
      
      float percent = ((voltage - min_voltage) / (max_voltage - min_voltage)) * 100.0;
      return percent;